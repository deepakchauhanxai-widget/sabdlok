<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>परिवार कविता – शब्दलोक</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&family=Noto+Serif+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="flower-rain.css">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #f8d9ee 0%, #d8e7fb 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: #0f172a;
            line-height: 1.8;
            padding: 0 1rem;
            position: relative;
            min-height: 100vh;
        }
        
        .flower-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .container {
            max-width: 820px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(4px);
        }

        .loader { text-align:center; padding:4rem 1rem; }
        .loader-spinner {
            width:48px; height:48px;
            border:4px solid rgba(255,255,255,0.3);
            border-top:4px solid #D97706;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
            margin:0 auto 1.2rem;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .loader p { color:#1e293b; font-size:1.1rem; }

        .category-top-link {
            display:inline-block;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding:0.3rem 1.2rem;
            border-radius:40px;
            font-size:0.9rem;
            color:#0f172a;
            text-decoration:none;
            font-weight:600;
            margin-bottom:1.2rem;
            transition:0.2s;
        }
        .category-top-link:hover { 
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .back-link {
            display:inline-block;
            margin-bottom:1.5rem;
            color:#0f172a;
            text-decoration:none;
            font-weight:600;
            font-size:0.95rem;
            margin-left:0.8rem;
            background: rgba(255, 255, 255, 0.2);
            padding:0.2rem 1rem;
            border-radius:30px;
            border:1px solid rgba(255,255,255,0.2);
            transition:0.2s;
        }
        .back-link:hover { 
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(-4px);
        }

        .poem-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin: 0.5rem 0 1.2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .poem-full-title {
            font-family:'Playfair Display',serif;
            font-size:2.4rem;
            color:#0f172a;
            margin-bottom:0.2rem;
            font-weight:700;
        }
        .poem-full-body {
            font-family:'Noto Serif Devanagari',serif;
            font-size:1.25rem;
            line-height:2.2;
            color:#0f172a;
            white-space:pre-line;
            border-top:1px solid rgba(255, 255, 255, 0.3);
            padding-top:1.5rem;
            margin-top:0.5rem;
            font-weight:500;
        }

        .poem-footer {
            margin-top:2.2rem;
            padding-top:1.5rem;
            border-top:2px solid rgba(255, 255, 255, 0.3);
        }
        .poem-moral-box {
            background: rgba(255, 255, 255, 0.3);
            padding:1.5rem 2rem;
            border-radius:16px;
            border-left:5px solid #D97706;
            margin-bottom:1.5rem;
        }
        .poem-moral-box strong {
            color:#0f172a;
            display:block;
            font-size:1.1rem;
            margin-bottom:0.3rem;
        }
        .poem-moral-box p { 
            margin:0; 
            font-size:1.05rem; 
            color:#1e293b;
            font-weight:500;
        }

        .poem-signature {
            display:flex;
            flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:0.8rem;
            font-size:1rem;
            color:#1e293b;
            background: rgba(255, 255, 255, 0.2);
            padding:0.8rem 1.5rem;
            border-radius:50px;
            border:1px solid rgba(255,255,255,0.2);
        }
        .poem-signature .author { font-weight:700; color:#0f172a; }
        .poem-signature .date { color:#1e293b; font-weight:500; }

        .share-section {
            margin-top:1.8rem;
            padding-top:1.5rem;
            border-top:1px solid rgba(255, 255, 255, 0.3);
            display:flex;
            gap:1rem;
            flex-wrap:wrap;
            align-items:center;
        }
        .share-section span { font-weight:600; color:#0f172a; }
        .btn-share {
            background: rgba(255, 255, 255, 0.2);
            border:1px solid rgba(255, 255, 255, 0.3);
            padding:0.5rem 1.5rem;
            border-radius:50px;
            font-size:0.95rem;
            cursor:pointer;
            transition:0.2s;
            color:#0f172a;
            font-weight:500;
        }
        .btn-share:hover { 
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        .btn-share.whatsapp:hover { background:#25D366; color:white; border-color:#25D366; }
        .btn-share.copy:hover { background:#D97706; color:white; border-color:#D97706; }
        .btn-share.twitter:hover { background:#1DA1F2; color:white; border-color:#1DA1F2; }

        .bottom-extra {
            margin-top:2.5rem;
            padding-top:1.5rem;
            border-top:1px solid rgba(255, 255, 255, 0.3);
            text-align:center;
            color:#1e293b;
            font-size:0.95rem;
            font-weight:500;
        }
        .bottom-extra a { 
            color:#0f172a; 
            text-decoration:none;
            font-weight:600;
            padding:0.1rem 0.6rem;
            border-radius:20px;
            transition:0.2s;
        }
        .bottom-extra a:hover { 
            background: rgba(255, 255, 255, 0.3);
        }
        .bottom-extra .heart { color:#b22222; }

        /* Error State */
        .error-box {
            text-align:center;
            padding:3rem 1rem;
        }
        .error-box .emoji { font-size:4rem; margin-bottom:0.5rem; }
        .error-box h3 { color:#b22222; margin-bottom:0.5rem; }
        .error-box p { color:#1e293b; }
        .error-box .btn-retry {
            display:inline-block;
            margin-top:1.5rem;
            background: rgba(255,255,255,0.3);
            padding:0.5rem 2rem;
            border-radius:40px;
            color:#0f172a;
            text-decoration:none;
            font-weight:600;
            border:1px solid rgba(255,255,255,0.3);
            transition:0.2s;
        }
        .error-box .btn-retry:hover {
            background: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }

        @media (max-width:640px) {
            .container { padding:1.5rem; margin:1rem auto; border-radius:24px; }
            .poem-full-title { font-size:1.8rem; }
            .poem-full-body { font-size:1.1rem; }
            .poem-signature { flex-direction:column; text-align:center; }
            .share-section { justify-content:center; }
            .poem-image { max-height: 250px; }
        }
    </style>
</head>
<body>

<!-- ===== FLOWER LAYER ===== -->
<div id="flowerLayer" class="flower-layer"></div>

<div class="container" id="detailApp">
    <!-- LOADING STATE -->
    <div id="loadingState" class="loader">
        <div class="loader-spinner"></div>
        <p>📖 कविता लोड हो रही है...</p>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" style="display:none;">
        <a href="#" class="category-top-link" id="categoryLink">🔙 CATEGORY_NAME पर जाएँ</a>
        <a href="index.html" class="back-link">← होम</a>

        <img id="poemImage" class="poem-image" style="display:none;" alt="कविता का चित्र">

        <h1 class="poem-full-title" id="poemTitle">—</h1>
        <div class="poem-full-body" id="poemBody">—</div>

        <div class="poem-footer">
            <div class="poem-moral-box" id="moralBox">
                <strong>📖 इस कविता से सीख:</strong>
                <p id="moralText">—</p>
            </div>
            <div class="poem-signature">
                <span class="author">✍️ <span id="authorName">—</span></span>
                <span class="date">📅 <span id="poemDate">—</span></span>
            </div>
        </div>

        <div class="share-section">
            <span>🔗 शेयर करें:</span>
            <button class="btn-share copy" onclick="shareLink()">📋 कॉपी लिंक</button>
            <button class="btn-share whatsapp" onclick="shareWhatsApp()">💬 व्हाट्सएप</button>
            <button class="btn-share twitter" onclick="shareTwitter()">🐦 ट्विटर</button>
        </div>

        <div class="bottom-extra">
            <p>🌸 <span class="heart">🙏</span> शब्दलोक – हर शब्द में है एक कहानी <span class="heart">🙏</span></p>
            <p style="margin-top:0.4rem; font-size:0.85rem;">
                <a href="index.html">🏠 होम</a> · 
                <a href="#" id="categoryBottomLink">❤️ परिवार कविताएँ</a> · 
                <a href="author.html">✍️ लेखक</a> · 
                <a href="contact.html">📞 संपर्क</a>
            </p>
            <p style="margin-top:0.6rem; font-size:0.8rem; color:#334155;">
                © 2026 शब्दलोक | Deepak Chauhan
            </p>
        </div>
    </div>
</div>

<script src="flower-rain.js"></script>
<script>
    // ============================================================
    // 🔥 CONFIGURATION - बस यहाँ CHANGE करो
    // ============================================================
    const CONFIG = {
        // 🔴 अपनी API URL डालो
        API_URL: 'https://script.google.com/macros/s/AKfycbwmLjhJ-Uz1smv9S4lUkKdyfyAXhKh4sNwveVSZDhbeF55bNXoLsFD-76WqfZ0YmWUWeQ/exec',
        
        // 🔴 Category Details
        CATEGORY_NAME: 'परिवार कविताएँ',
        CATEGORY_LINK: 'category_family.html?cat=family',
        CATEGORY_EMOJI: '👨‍👩‍👧',
        
        // 🔴 API से किस key में poems हैं
        // अगर नहीं पता तो 'auto' करो - खुद detect करेगा
        POEMS_KEY: 'auto' // 'familyPoems' या 'familyCard' या 'auto'
    };
    // ============================================================

    // DOM Elements
    const loading = document.getElementById('loadingState');
    const main = document.getElementById('mainContent');

    // Set category links
    document.getElementById('categoryLink').textContent = '🔙 ' + CONFIG.CATEGORY_NAME;
    document.getElementById('categoryLink').href = CONFIG.CATEGORY_LINK;
    document.getElementById('categoryBottomLink').textContent = CONFIG.CATEGORY_EMOJI + ' ' + CONFIG.CATEGORY_NAME;
    document.getElementById('categoryBottomLink').href = CONFIG.CATEGORY_LINK;

    // ============================================================
    // 🔥 MAIN FUNCTION - Load Poem
    // ============================================================
    async function loadPoem() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        // Validate slug
        if (!slug) {
            showError('❌ कविता नहीं मिली। कृपया सही लिंक से आएँ।');
            return;
        }

        try {
            // Show loading
            loading.style.display = 'block';
            loading.innerHTML = `
                <div class="loader-spinner"></div>
                <p>📖 कविता लोड हो रही है...</p>
            `;

            // 🔥 Fetch API
            console.log('📡 Fetching:', CONFIG.API_URL);
            const response = await fetch(CONFIG.API_URL);
            
            if (!response.ok) {
                throw new Error(`Network error: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            console.log('📦 API Response:', data);

            // 🔥 Auto-detect poems array
            let poems = [];
            
            if (CONFIG.POEMS_KEY === 'auto') {
                // Try all possible keys
                const possibleKeys = ['familyPoems', 'familyCard', 'poems', 'data', 'items', 'poetry'];
                for (let key of possibleKeys) {
                    if (data[key] && Array.isArray(data[key]) && data[key].length > 0) {
                        poems = data[key];
                        console.log('✅ Found poems in key:', key);
                        break;
                    }
                }
                // अगर कोई key न मिले तो पूरा data ही poems हो सकता है
                if (poems.length === 0 && Array.isArray(data)) {
                    poems = data;
                    console.log('✅ Data is directly an array');
                }
            } else {
                // Use specific key
                poems = data[CONFIG.POEMS_KEY] || [];
                console.log('📚 Using key:', CONFIG.POEMS_KEY, 'Found:', poems.length);
            }

            if (poems.length === 0) {
                throw new Error('❌ डेटाबेस में कोई कविता नहीं मिली।');
            }

            console.log('📚 Total poems found:', poems.length);

            // 🔥 Find poem by slug
            let poem = poems.find(p => p.slug === slug);
            
            // अगर slug से न मिले तो title से ढूँढो
            if (!poem) {
                const decodedSlug = decodeURIComponent(slug);
                poem = poems.find(p => p.title === decodedSlug);
                console.log('🔍 Searching by title:', decodedSlug);
            }

            // अगर फिर भी न मिले तो partial match करो
            if (!poem) {
                poem = poems.find(p => 
                    p.slug && p.slug.includes(slug) || 
                    p.title && p.title.includes(decodeURIComponent(slug))
                );
                console.log('🔍 Partial match search');
            }

            if (!poem) {
                showError('❌ यह कविता हमारे डेटाबेस में नहीं मिली।');
                return;
            }

            console.log('✅ Found poem:', poem.title);

            // ============================================================
            // 📝 Display Poem
            // ============================================================
            
            // Date format
            let date = poem.date || '';
            if (date.includes('T')) {
                const d = new Date(date);
                date = d.toLocaleDateString('hi-IN', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric' 
                });
            }

            // Extract content and moral
            let content = poem.description || poem.content || poem.poem || '';
            let moral = 'जीवन की हर राह में एक सीख छिपी है।';
            
            // Try to extract moral
            const moralPatterns = [
                '<b>📖 इस कविता से सीख:</b>',
                '<b>📖 इस कविता से सीख</b>',
                '📖 इस कविता से सीख:',
                'सीख:',
                'Moral:'
            ];
            
            for (let pattern of moralPatterns) {
                if (content.includes(pattern)) {
                    const parts = content.split(pattern);
                    content = parts[0].trim();
                    if (parts[1]) {
                        moral = parts[1].trim();
                        // Remove HTML tags if any
                        moral = moral.replace(/<\/?[^>]+(>|$)/g, "").trim();
                        break;
                    }
                }
            }

            // Image
            const imageEl = document.getElementById('poemImage');
            const imageUrl = poem.image || poem.img || poem.image_url || '';
            if (imageUrl && imageUrl.trim() !== '') {
                imageEl.src = imageUrl;
                imageEl.style.display = 'block';
                imageEl.alt = poem.title || 'कविता का चित्र';
                // Image load error handling
                imageEl.onerror = function() {
                    this.style.display = 'none';
                };
            } else {
                imageEl.style.display = 'none';
            }

            // Set content
            document.getElementById('poemTitle').textContent = poem.title || 'अनाम कविता';
            document.getElementById('poemBody').innerHTML = content;
            document.getElementById('moralText').textContent = moral;
            document.getElementById('authorName').textContent = poem.author || 'Deepak Chauhan';
            document.getElementById('poemDate').textContent = date || '—';

            // Update page title
            document.title = `${poem.title || 'कविता'} – शब्दलोक`;

            // Show content, hide loader
            loading.style.display = 'none';
            main.style.display = 'block';
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (error) {
            console.error('❌ Error:', error);
            showError('❌ ' + error.message);
        }
    }

    // ============================================================
    // 🔥 Error Display
    // ============================================================
    function showError(message) {
        loading.innerHTML = `
            <div class="error-box">
                <div class="emoji">😔</div>
                <h3>कविता नहीं मिली</h3>
                <p>${message}</p>
                <div style="margin-top:1.5rem; display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
                    <a href="index.html" class="btn-retry">🏠 होम पेज</a>
                    <a href="${CONFIG.CATEGORY_LINK}" class="btn-retry">🔙 ${CONFIG.CATEGORY_NAME}</a>
                    <button onclick="location.reload()" class="btn-retry">🔄 पुनः प्रयास करें</button>
                </div>
            </div>
        `;
        main.style.display = 'none';
    }

    // ============================================================
    // 🔥 Share Functions
    // ============================================================
    function getFullUrl() { 
        return window.location.href; 
    }
    
    function getTitle() { 
        return document.getElementById('poemTitle').textContent; 
    }

    function shareLink() {
        const url = getFullUrl();
        if (navigator.share) {
            navigator.share({ 
                title: getTitle(), 
                text: '📖 ' + getTitle() + ' - शब्दलोक पर पढ़ें', 
                url: url 
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ लिंक कॉपी हो गया!');
            }).catch(() => {
                prompt('लिंक कॉपी करें:', url);
            });
        }
    }

    function shareWhatsApp() {
        const text = `📖 ${getTitle()} - शब्दलोक पर पढ़ें:\n${getFullUrl()}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function shareTwitter() {
        const text = `📖 ${getTitle()} - शब्दलोक`;
        window.open(
            `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(getFullUrl())}`,
            '_blank'
        );
    }

    // ============================================================
    // 🌸 Flower Rain - Restart
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        const layer = document.getElementById('flowerLayer');
        if (layer) {
            layer.style.zIndex = '0';
        }
        if (typeof window.initFlowerRain === 'function') {
            window.initFlowerRain();
        } else if (typeof window.flowerRain !== 'undefined' && window.flowerRain.restart) {
            window.flowerRain.restart();
        }
    });

    // ============================================================
    // 🚀 Start the App
    // ============================================================
    loadPoem();
</script>
</body>
</html>
