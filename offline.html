<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ऑफलाइन – शब्दलोक</title>
    <style>
        body {
            background: #FAF7F2;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 3rem 1rem;
            color: #2C2C2C;
        }
        .offline-box {
            max-width: 400px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid #E9E1D8;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        .offline-icon { font-size: 4rem; }
        h1 { font-family: 'Playfair Display', serif; }
        p { color: #888; }
        .btn {
            display: inline-block;
            background: #8B5E3C;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 1rem;
        }
        .btn:hover { background: #6f4a2e; }
    </style>
</head>
<body>
    <div class="offline-box">
        <div class="offline-icon">🌐</div>
        <h1>ऑफलाइन</h1>
        <p>आपका इंटरनेट कनेक्शन नहीं है।</p>
        <p>कृपया कनेक्ट होकर वापस आएँ।</p>
        <a href="index.html" class="btn">होम जाएँ</a>
    </div>
</body>
</html>
