<script>
    // ===== FLOWER RAIN RESTART =====
    document.addEventListener('DOMContentLoaded', function() {
        const layer = document.getElementById('flowerLayer');
        if (layer) {
            layer.style.zIndex = '0';
        }
        
        if (typeof window.initFlowerRain === 'function') {
            window.initFlowerRain();
        } else if (typeof window.flowerRain !== 'undefined' && window.flowerRain.restart) {
            window.flowerRain.restart();
        }
    });

    // ============================================================
    // 📅 शब्दलोक - शेड्यूल सिस्टम (FIXED)
    // ============================================================

    (function() {
        console.log('📅 शेड्यूल सिस्टम शुरू...');

        // ===== 1. ALL 11 CATEGORIES WITH FIXED DATES =====
        const SCHEDULE = [
            { date: 19, emoji: '🌙', name: 'अकेलापन', slug: 'loneliness' },
            { date: 20, emoji: '❤️', name: 'प्रेम', slug: 'love' },
            { date: 21, emoji: '👩', name: 'माँ', slug: 'mother' },
            { date: 22, emoji: '👨', name: 'पिता', slug: 'father' },
            { date: 23, emoji: '👨‍👩‍👧', name: 'परिवार', slug: 'family' },
            { date: 24, emoji: '💪', name: 'संघर्ष', slug: 'struggle' },
            { date: 25, emoji: '😊', name: 'प्रेरणा', slug: 'inspiration' },
            { date: 26, emoji: '🧠', name: 'जीवन दर्शन', slug: 'philosophy' },
            { date: 27, emoji: '🌿', name: 'प्रकृति', slug: 'nature' },
            { date: 28, emoji: '🇮🇳', name: 'देशभक्ति', slug: 'patriotism' },
            { date: 29, emoji: '⏳', name: 'समय', slug: 'time' }
        ];

        // ===== 2. MONTH NAMES =====
        const MONTHS = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर'];

        // ===== 3. GET DATE INFO (FIXED: समाप्त हो चुकी तारीखों को आगे बढ़ाएं) =====
        function getDateInfo(targetDate) {
            const today = new Date();
            const currentDate = today.getDate();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            const currentFullDate = new Date(currentYear, currentMonth, currentDate);
            
            // पहले current month का target date बनाएं
            let targetFullDate = new Date(currentYear, currentMonth, targetDate);
            
            // अगर target date आज से कम (बीत चुकी) है तो अगले महीने
            // ⚠️ FIX: यहाँ <= use किया ताकि आज की तारीख भी अगर हो तो वो today रहे
            if (targetFullDate < currentFullDate) {
                targetFullDate = new Date(currentYear, currentMonth + 1, targetDate);
            }
            
            // अगर target date आज की है तो today flag true
            const isToday = targetFullDate.getTime() === currentFullDate.getTime();

            return {
                day: targetFullDate.getDate(),
                month: MONTHS[targetFullDate.getMonth()],
                fullDate: targetFullDate,
                isToday: isToday,
                // यह बताएगा कि यह कविता अपलोड हो चुकी है या नहीं
                isPassed: targetFullDate < currentFullDate
            };
        }

        // ===== 4. CREATE SCHEDULE CARDS =====
        function createSchedule() {
            const grid = document.getElementById('scheduleGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            const cards = [];
            
            SCHEDULE.forEach(item => {
                const info = getDateInfo(item.date);
                
                const card = document.createElement('div');
                card.className = 'schedule-item';
                card.dataset.date = item.date;
                
                let statusText = '';
                let statusClass = '';
                
                if (info.isToday) {
                    statusText = '🌟 आज!';
                    statusClass = 'today';
                } else if (info.isPassed) {
                    // ✅ FIX: बीत चुकी कविताएँ
                    statusText = '✅ अपलोड हो चुकी';
                    statusClass = 'passed';
                } else {
                    statusText = `✅ अगला : ${info.day} ${info.month}`;
                    statusClass = 'upcoming';
                }
                
                // डेट डिस्प्ले के लिए
                let dayDisplay = `${info.day} ${info.month}`;
                
                card.innerHTML = `
                    <div class="schedule-cat">
                        <span class="emoji">${item.emoji}</span>
                        <span class="name">${item.name}</span>
                    </div>
                    <span class="schedule-day">📅 <strong>${dayDisplay}</strong></span>
                    <span class="schedule-status ${statusClass}">${statusText}</span>
                `;
                
                cards.push({
                    element: card,
                    date: item.date,
                    isToday: info.isToday,
                    isPassed: info.isPassed,
                    fullDate: info.fullDate,
                    // सॉर्टिंग के लिए priority: today first, then upcoming, then passed
                    priority: info.isToday ? 0 : (info.isPassed ? 2 : 1)
                });
            });
            
            // ===== 5. SORT: Today first, then Upcoming, then Passed (नीचे) =====
            cards.sort((a, b) => {
                // पहले priority के हिसाब से
                if (a.priority !== b.priority) {
                    return a.priority - b.priority;
                }
                // फिर date के हिसाब से
                return a.date - b.date;
            });
            
            // ===== 6. APPEND TO GRID =====
            cards.forEach(card => {
                grid.appendChild(card.element);
            });
            
            console.log('✅ शेड्यूल बन गया!');
        }

        // ===== 7. AUTO UPDATE EVERY 30 SECONDS =====
        function autoUpdate() {
            createSchedule();
        }

        // ===== 8. START =====
        document.addEventListener('DOMContentLoaded', function() {
            createSchedule();
            // हर 30 सेकंड में चेक करेगा
            setInterval(autoUpdate, 30000);
        });

        console.log('✅ शेड्यूल सिस्टम तैयार!');

    })();
</script>
