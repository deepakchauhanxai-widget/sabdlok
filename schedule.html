<script>
    // ===== FLOWER RAIN =====
    document.addEventListener('DOMContentLoaded', function() {
        const layer = document.getElementById('flowerLayer');
        if (layer) layer.style.zIndex = '0';
        if (typeof window.initFlowerRain === 'function') {
            window.initFlowerRain();
        } else if (typeof window.flowerRain !== 'undefined' && window.flowerRain.restart) {
            window.flowerRain.restart();
        }
    });

    // ============================================================
    // 📅 CYCLIC SCHEDULE SYSTEM - 11 CATEGORIES, 1 PER DAY
    // ============================================================

    (function() {
        console.log('📅 साइक्लिक शेड्यूल सिस्टम शुरू...');

        // ===== 11 CATEGORIES IN ORDER =====
        const CATEGORIES = [
            { emoji: '🌙', name: 'अकेलापन', slug: 'loneliness' },
            { emoji: '❤️', name: 'प्रेम', slug: 'love' },
            { emoji: '👩', name: 'माँ', slug: 'mother' },
            { emoji: '👨', name: 'पिता', slug: 'father' },
            { emoji: '👨‍👩‍👧', name: 'परिवार', slug: 'family' },
            { emoji: '💪', name: 'संघर्ष', slug: 'struggle' },
            { emoji: '😊', name: 'प्रेरणा', slug: 'inspiration' },
            { emoji: '🧠', name: 'जीवन दर्शन', slug: 'philosophy' },
            { emoji: '🌿', name: 'प्रकृति', slug: 'nature' },
            { emoji: '🇮🇳', name: 'देशभक्ति', slug: 'patriotism' },
            { emoji: '⏳', name: 'समय', slug: 'time' }
        ];

        const TOTAL = CATEGORIES.length;
        const MONTHS = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर'];

        // ===== START DATE: 19 JULY 2026 =====
        const START_DATE = new Date(2026, 6, 19); // 19 July 2026

        function getSchedule() {
            const today = new Date();
            // दिनों का अंतर निकालें
            const diffDays = Math.floor((today - START_DATE) / (1000 * 60 * 60 * 24));
            
            // आज का इंडेक्स (कौन सी कैटेगरी आज है)
            const todayIndex = ((diffDays % TOTAL) + TOTAL) % TOTAL;
            
            const schedule = [];
            
            CATEGORIES.forEach((cat, index) => {
                // इस कैटेगरी का दिन कब आएगा
                let daysOffset = index - todayIndex;
                if (daysOffset < 0) daysOffset += TOTAL;
                
                const targetDate = new Date(today);
                targetDate.setDate(today.getDate() + daysOffset);
                
                const isToday = daysOffset === 0;
                
                schedule.push({
                    ...cat,
                    index: index,
                    daysOffset: daysOffset,
                    targetDate: targetDate,
                    isToday: isToday,
                    dateDisplay: `${targetDate.getDate()} ${MONTHS[targetDate.getMonth()]}`
                });
            });
            
            // Sort: Today first, then by daysOffset
            schedule.sort((a, b) => {
                if (a.isToday && !b.isToday) return -1;
                if (!a.isToday && b.isToday) return 1;
                return a.daysOffset - b.daysOffset;
            });
            
            return schedule;
        }

        function renderSchedule() {
            const grid = document.getElementById('scheduleGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            const schedule = getSchedule();
            
            schedule.forEach(item => {
                const card = document.createElement('div');
                card.className = 'schedule-item';
                
                let statusText = `✅ अगला : ${item.dateDisplay}`;
                let statusClass = 'upcoming';
                
                if (item.isToday) {
                    statusText = '🌟 आज!';
                    statusClass = 'today';
                }
                
                card.innerHTML = `
                    <div class="schedule-cat">
                        <span class="emoji">${item.emoji}</span>
                        <span class="name">${item.name}</span>
                    </div>
                    <span class="schedule-day">📅 <strong>${item.dateDisplay}</strong></span>
                    <span class="schedule-status ${statusClass}">${statusText}</span>
                `;
                
                grid.appendChild(card);
            });
            
            console.log('✅ शेड्यूल अपडेट हो गया!');
        }

        // ===== RENDER NOW AND EVERY 30 SEC =====
        renderSchedule();
        setInterval(renderSchedule, 30000);
        
        console.log('✅ साइक्लिक शेड्यूल सिस्टम तैयार!');
        console.log(`📅 कुल ${TOTAL} कैटेगरी, हर दिन 1 अपडेट`);

    })();
</script>
